default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "pdxhackerspace_library_development") %>
  seeds: true

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "pdxhackerspace_library_test") %>
  seeds: false

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "pdxhackerspace_library_production") %>
  seeds: false
