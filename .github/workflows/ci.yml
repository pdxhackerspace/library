name: ci

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RAILS_ENV: test
  DB_HOST: localhost
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  DB_PORT: 5432
  DB_NAME: pdxhackerspace_library_test
  REDIS_URL: redis://localhost:6379/0
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: test-password-123
  ADMIN_NAME: Test Admin

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby-app

      - name: Cache RuboCop
        uses: ./.github/actions/cache-rubocop

      - name: Lint (RuboCop)
        run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pdxhackerspace_library_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby-app

      - name: Set up frontend assets
        uses: ./.github/actions/setup-frontend

      - name: Prepare database
        run: bin/rails db:test:prepare

      - name: Run tests
        run: bin/rails test
