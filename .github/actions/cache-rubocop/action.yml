name: Cache RuboCop
description: Restore and save RuboCop offense cache
runs:
  using: composite
  steps:
    - uses: actions/cache@v5
      with:
        path: tmp/rubocop-cache
        key: rubocop-${{ runner.os }}-${{ hashFiles('.rubocop.yml', '**/*.rb') }}
        restore-keys: |
          rubocop-${{ runner.os }}-
